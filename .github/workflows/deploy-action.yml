name: Deploy
on:
  workflow_dispatch: 
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-lastest
    steps:
      - name: Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{secrets.SERVER_HOST}}
        username: ${{secrets.SERVER_USER}}
        key: ${{secrets.SSH_KEY}}
        port: 22
        script: | 
          echo "스크립트 실행"
          cd /mnt/ssd/www/TeamWebSite
          git fetch origin
          git reset --hard origin/main
          git clean -fd
          echo "Git Pull 완료"

          
