name: Deploy

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo "스크립트 실행"

            cd /mnt/ssd/www/TeamWebSite

            echo "Git 최신화 시작"
            git fetch origin
            git reset --hard origin/main
            git clean -fd
            echo "Git 최신화 완료"
            sudo chown -R seopia:www-data /mnt/ssd/www/TeamWebSite
            echo "폴더 소유자 변경 완료"
